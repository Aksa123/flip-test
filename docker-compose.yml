services:
  postgres-db:
    image: postgres:16
    container_name: db
    expose:
      - 5432
    ports:
      - 5433:5432
    volumes:
      - postgres-test-flip:/var/lib/postgresql/data:rw
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  app:
    build: .
    container_name: fastapi-app
    volumes:
      - ./app/:/code/app
      - ./test.log:/code/test.log
    ports:
      - 8080:80
    env_file:
      - .env
    environment:
      - IS_DOCKER=1
      - DB_HOST=postgres-db  
    depends_on:
      postgres-db:
        condition: service_healthy


volumes:
  postgres-test-flip: